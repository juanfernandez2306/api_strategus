<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restablecer Contraseña - SIGEPAD</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 20px; background-color: #f9f9f9; display: flex; justify-content: center; align-items: center; min-height: 90vh; }
        .card { max-width: 450px; width: 100%; padding: 30px; border: 1px solid #eee; border-radius: 8px; background-color: #ffffff; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        h2 { color: #333; margin-top: 0; text-align: center; }
        p { color: #666; font-size: 14px; text-align: center; margin-bottom: 25px; }
        
        /* Estilo de la Card informativa del Perfil */
        .profile-card {
            background-color: #f3f4f6;
            border-left: 4px solid #e11d48;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 25px;
        }
        .profile-card .title { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: #6b7280; font-weight: bold; margin-bottom: 2px; }
        .profile-card .value { font-size: 15px; color: #1f2937; font-weight: 500; margin-bottom: 10px; }
        .profile-card .value:last-child { margin-bottom: 0; }

        /* Estilos del Formulario y Grupos */
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 14px; font-weight: bold; color: #444; margin-bottom: 5px; }
        
        /* Contenedor del Input con Icono (Equivalente a tu CSS de LoginLayout) */
        .password-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        
        input[type="password"], input[type="text"] { 
            width: 100%; padding: 10px 45px 10px 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 15px; 
        }
        input:focus { border-color: #e11d48; outline: none; }
        
        /* Botón de visibilidad interactivo */
        .icon-button {
            position: absolute;
            right: 5px;
            background: none;
            border: none;
            padding: 5px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 80%;
        }
        .icon-button:focus { outline: none; }
        
        /* Estilo y dimensionamiento unificado del SVG */
        .icon-svg {
            width: 24px;
            height: 24px;
            fill: #6b7280; /* Color grisáceo neutral */
            transition: fill 0.2s;
        }
        .icon-button:hover .icon-svg {
            fill: #111827; /* Se oscurece al pasar el cursor */
        }
        
        .btn { background: #e11d48; color: white; padding: 12px; border: none; border-radius: 4px; width: 100%; font-weight: bold; font-size: 16px; cursor: pointer; transition: background 0.2s; margin-top: 10px; }
        .btn:hover { background: #be123c; }
        .hint { font-size: 12px; color: #666; margin-top: 5px; line-height: 1.4; }
    </style>
</head>
<body>

    <svg style="display: none;">
        <symbol id="eye-filled" viewBox="0 0 512 512">
            <g transform="translate(42.666667, 85.333333)">
                <path d="M213.333333,1.42108547e-14 C362.666667,1.42108547e-14 426.666667,170.666667 426.666667,170.666667 C426.666667,170.666667 362.666667,341.333333 213.333333,341.333333 C64,341.333333 7.10542736e-15,170.666667 7.10542736e-15,170.666667 C7.10542736e-15,170.666667 64,1.42108547e-14 213.333333,1.42108547e-14 Z M213.333333,96 C172.096427,96 138.666667,129.42976 138.666667,170.666667 C138.666667,211.903573 172.096427,245.333333 213.333333,245.333333 C254.57024,245.333333 288,211.903573 288,170.666667 C288,129.42976 254.57024,96 213.333333,96 Z M213.333333,202.666667 C195.688747,202.666667 181.333333,188.311253 181.333333,170.666667 C181.333333,153.02208 195.688747,138.666667 213.333333,138.666667 C230.97792,138.666667 245.333333,153.02208 245.333333,170.666667 C245.333333,188.311253 230.97792,202.666667 213.333333,202.666667 Z"></path>
            </g>
        </symbol>
        <symbol id="eye-off" viewBox="0 0 24 24">
            <path fill-rule="evenodd" clip-rule="evenodd" d="M2.29289 2.29289C2.68342 1.90237 3.31658 1.90237 3.70711 2.29289L21.7071 20.2929C22.0976 20.6834 22.0976 21.3166 21.7071 21.7071C21.3166 22.0976 20.6834 22.0976 20.2929 21.7071L2.29289 3.70711C1.90237 3.31658 1.90237 2.68342 2.29289 2.29289Z"></path>
            <path fill-rule="evenodd" clip-rule="evenodd" d="M7.14912 6.56333C6.92238 6.70734 6.70294 6.85657 6.49128 7.00884C4.98034 8.0959 3.78013 9.40024 3.04026 10.2985C2.21965 11.2948 2.21965 12.7052 3.04026 13.7015C3.78013 14.5998 4.98034 15.9041 6.49128 16.9912C7.99432 18.0725 9.89024 19 12.0002 19C14.1101 19 16.006 18.0725 17.5091 16.9912C17.5222 16.9817 17.5354 16.9722 17.5485 16.9627L15.1062 14.5204C14.3728 15.4232 13.2538 16 12 16C9.79086 16 8 14.2091 8 12C8 10.7462 8.57683 9.6272 9.47958 8.89379L7.14912 6.56333ZM15.9627 12.5485C15.9873 12.3692 16 12.1861 16 12C16 9.79086 14.2091 8 12 8C11.8139 8 11.6308 8.01271 11.4515 8.03729L9.55224 6.13802C9.29802 5.88381 9.38795 5.45339 9.7319 5.34875C10.4518 5.12974 11.211 5 12.0002 5C14.1101 5 16.006 5.92747 17.5091 7.00885C19.02 8.0959 20.2202 9.40025 20.9601 10.2985C21.7807 11.2948 21.7807 12.7052 20.9601 13.7015C20.5739 14.1703 20.0624 14.7498 19.4467 15.3512C19.2543 15.5392 18.9473 15.533 18.7571 15.3429L15.9627 12.5485ZM10.9092 10.3234C10.3618 10.6802 10 11.2979 10 12C10 13.1046 10.8954 14 12 14C12.7021 14 13.3198 13.6382 13.6766 13.0908L10.9092 10.3234Z"></path>
        </symbol>
    </svg>

    <div class="card">
        <h2>Actualizar Contraseña</h2>
        <p>Estás restableciendo el acceso para la siguiente cuenta:</p>
        
        <div class="profile-card">
            <div class="title">Nombre de Usuario</div>
            <div class="value" id="viewNombre">Cargando...</div>
            
            <div class="title">Correo Electrónico</div>
            <div class="value" id="viewEmail">Cargando...</div>
        </div>

        <form action="" method="POST" onsubmit="return validarFormulario()">
            <input type="hidden" name="token" id="token">
            <input type="hidden" name="email" id="email">

            <div class="form-group">
                <label for="password">Nueva Contraseña</label>
                <div class="password-wrapper">
                    <input type="password" name="password" id="password" required minlength="6">
                    <button type="button" class="icon-button" onclick="toggleVisibility('password', 'eye-icon-1')" aria-label="Mostrar u ocultar contraseña">
                        <svg class="icon-svg"><use id="eye-icon-1" xlink:href="#eye-off"></use></svg>
                    </button>
                </div>
                <div class="hint">Mínimo 6 caracteres, debe incluir letras, números y un carácter especial (ej. @, #, $, !).</div>
            </div>

            <div class="form-group">
                <label for="password_confirm">Confirmar Contraseña</label>
                <div class="password-wrapper">
                    <input type="password" name="password_confirm" id="password_confirm" required>
                    <button type="button" class="icon-button" onclick="toggleVisibility('password_confirm', 'eye-icon-2')" aria-label="Mostrar u ocultar contraseña">
                        <svg class="icon-svg"><use id="eye-icon-2" xlink:href="#eye-off"></use></svg>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn">Actualizar Contraseña</button>
        </form>
    </div>

    <script>
        // 1. Extraer dinámicamente los parámetros de la URL
        const params = new URLSearchParams(window.location.search);
        const emailParam = params.get('email') || '';
        const tokenParam = params.get('token') || '';

        document.getElementById('token').value = tokenParam;
        document.getElementById('email').value = emailParam;

        if (emailParam) {
            document.getElementById('viewEmail').textContent = emailParam;
            const nombreInferido = emailParam.split('@')[0].replace(/[^a-zA-Z]/g, ' ');
            document.getElementById('viewNombre').textContent = nombreInferido.toUpperCase();
        } else {
            document.getElementById('viewEmail').textContent = "No proporcionado";
            document.getElementById('viewNombre').textContent = "No proporcionado";
        }

        // 2. Función interactiva de visibilidad (Equivalente al hook setPasswordVisible)
        function toggleVisibility(inputId, useIconId) {
            const inputField = document.getElementById(inputId);
            const useElement = document.getElementById(useIconId);

            if (inputField.type === "password") {
                inputField.type = "text";
                useElement.setAttribute('xlink:href', '#eye-filled'); // Cambia al ojo relleno/abierto
            } else {
                inputField.type = "password";
                useElement.setAttribute('xlink:href', '#eye-off'); // Regresa al ojo tachado
            }
        }

        // 3. Validación unificada con tu frontend (validatorsForm.ts)
        function validarFormulario() {
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('password_confirm').value;
            
            const passwordRegex = /^(?=.*[A-Za-z])(?=.*\d)(?=.*[^A-Za-z0-9]).{6,}$/;

            if (/\s/.test(password)) {
                alert("La contraseña no puede contener espacios en blanco.");
                return false;
            }

            if (!passwordRegex.test(password)) {
                alert("La contraseña debe tener al menos 6 caracteres e incluir letras, números y un carácter especial.");
                return false;
            }

            if (password !== confirmPassword) {
                alert("Las contraseñas ingresadas no coinciden.");
                return false;
            }

            return true;
        }
    </script>
</body>
</html>
