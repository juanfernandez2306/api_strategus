<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificación de Cuenta</title>
    <style>
        /* Reutilización de tus variables de App.css */
        :root {
            --font-header: 'Roboto Condensed', Arial, Helvetica, sans-serif;
            --font-body: 'Nunito', Arial, Helvetica, sans-serif;
            --firts-color: #386641;
            --error-color: #d32f2f;
            --color-negro: #222222;
            --border-neutral-color: #cbcbcb;
            --shadow-subtle: 0 4px 20px rgba(0, 0, 0, 0.08);
            --button-active-color: #2c5233;
        }

        body {
            margin: 0;
            padding: 0;
            height: 100dvh;
            width: 100dvw;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--border-neutral-color);
            font-family: var(--font-body);
            color: var(--color-negro);
        }

        .card {
            background-color: #ffffff;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: var(--shadow-subtle);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        .icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            line-height: 1;
        }

        /* Clases dinámicas según el estado */
        .success .icon { color: var(--firts-color); }
        .success h1 { color: var(--firts-color); }
        
        .error .icon { color: var(--error-color); }
        .error h1 { color: var(--error-color); }

        h1 {
            font-family: var(--font-header);
            margin-top: 0;
            font-size: 1.8rem;
        }

        p {
            font-size: 1rem;
            line-height: 1.5;
            margin-bottom: 2rem;
            color: #555;
        }

        .btn {
            display: inline-block;
            background-color: var(--firts-color);
            color: #ffffff;
            text-decoration: none;
            padding: 0.8rem 2rem;
            border-radius: 6px;
            font-weight: bold;
            transition: background-color 0.2s ease;
        }

        .btn:hover, .btn:active {
            background-color: var(--button-active-color);
        }

        .btn-error {
            background-color: var(--color-negro);
        }
        .btn-error:hover {
            background-color: #000000;
        }
    </style>
</head>
<body>

    <div class="card {{STATUS_CLASS}}">
        <div class="icon">{{ICON}}</div>
        <h1>{{TITLE}}</h1>
        <p>{{MESSAGE}}</p>
        <a href="{{BUTTON_LINK}}" class="btn {{BTN_CLASS}}">{{BUTTON_TEXT}}</a>
    </div>

</body>
</html>
